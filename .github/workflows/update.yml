name: Update Pure Source
on:
  schedule:
    - cron: '0 0 * * *'
  workflow_dispatch:

# 核心：显式声明权限
permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          
      - name: Run Clean Script
        run: |
          pip install requests
          # 运行脚本并显示详细报错
          python clean.py
          
      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add pure_source.json
          # 如果文件没变化，git commit 会报错，用 || true 忽略它
          git commit -m "Update pure source" || true
          git push origin main
