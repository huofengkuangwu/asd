name: Update Pure Source
on:
  schedule:
    - cron: '0 0 * * *' # 每天凌晨自动更新
  workflow_dispatch: # 支持手动点运行

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v3
        
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'
          
      - name: Run Clean Script
        run: |
          pip install requests
          python clean.py
          
      - name: Commit and Push
        run: |
          git config --global user.name "GitHub Action"
          git config --global user.email "action@github.com"
          git add pure_source.json
          git commit -m "Update pure source" || exit 0
          git push
